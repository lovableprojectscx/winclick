    <!-- ═══ SCHEMA.ORG — Organization ═══ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Winclick",
      "alternateName": "Winclick Perú",
      "description": "Plataforma MLM de productos orgánicos y premium en Perú. Gana comisiones de hasta 25% en 10 niveles de red de afiliados.",
      "url": "https://winclick.online",
      "logo": "https://winclick.online/logo-winclick.png",
      "image": "https://winclick.online/foto-index.webp",
      "slogan": "Tu éxito a un solo click",
      "foundingLocation": {
        "@type": "Place",
        "address": {
          "@type": "PostalAddress",
          "addressLocality": "Lima",
          "addressRegion": "Lima",
          "addressCountry": "PE"
        }
      },
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer service",
        "availableLanguage": "Spanish",
        "email": "contacto@winclick.online"
      },
      "sameAs": [
        "https://facebook.com/winclick",
        "https://instagram.com/winclick",
        "https://tiktok.com/@winclick"
      ]
    }
    </script>

    <!-- ═══ SCHEMA.ORG — FAQPage ═══ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "¿Qué es Winclick y cómo funciona?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Winclick es una plataforma de marketing multinivel (MLM) en Perú que te permite ganar comisiones de hasta 25% vendiendo productos orgánicos y premium, y construyendo tu propia red de afiliados hasta 10 niveles de profundidad."
          }
        },
        {
          "@type": "Question",
          "name": "¿Cuánto puedo ganar con Winclick en Perú?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Puedes ganar hasta 25% de comisión acumulada entre tus ventas directas y las de tu red. El nivel 1 da 10%, más bonos adicionales. Tus ganancias dependen de tu esfuerzo y el tamaño de tu red."
          }
        },
        {
          "@type": "Question",
          "name": "¿Cómo me registro en Winclick?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "El registro es gratuito. Ingresa a winclick.online/registro-afiliado, completa tus datos y elige tu paquete de activación. En minutos tendrás tu tienda online personal lista para vender."
          }
        },
        {
          "@type": "Question",
          "name": "¿Los productos de Winclick son orgánicos certificados?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sí. Winclick comercializa productos orgánicos y premium seleccionados con criterios de calidad. Nuestro catálogo incluye suplementos, proteínas, colágeno, detox y más, todos verificados."
          }
        },
        {
          "@type": "Question",
          "name": "¿Es legal el negocio multinivel de Winclick en Perú?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Sí. Winclick opera como empresa de venta directa legítima, distinta de las pirámides ilegales porque el ingreso se genera por ventas reales de productos, no por captación de personas."
          }
        },
        {
          "@type": "Question",
          "name": "¿Cómo recibo mis comisiones?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Las comisiones se acreditan en tu Billetera Winclick y puedes retirarlas vía Yape, Plin o transferencia bancaria. El mínimo de retiro es S/ 20 y el procesamiento toma hasta 3 días hábiles."
          }
        }
      ]
    }
    </script>

    <!-- ═══ SCHEMA.ORG — LocalBusiness ═══ -->

      "@context": "https://schema.org",
